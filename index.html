/* Cards stay opaque */
.card, .event-card, .stat-card, .sheet, .tab-bar, .app-header{
  background-color: var(--card);
  position: relative;
}
.stat-card{background-color: var(--card)}
.sheet{background-color: var(--bg)}
.tab-bar{background-color: #fff}
.screen{display:none}
.screen.active{display:block}
.app-header{background:var(--header);color:#fff;padding:16px 20px 14px;position:sticky;top:0;z-index:50;background-image:linear-gradient(135deg,#7B3B5E 0%,#9B4E5E 50%,#C4614A 100%)}
.app-header h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:900}
.app-header h1 span{color:#EF9F27}
.header-sub{font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px}
.back-btn{display:flex;align-items:center;gap:5px;background:none;border:none;color:rgba(255,255,255,0.6);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;padding:0 0 6px 0}
.container{padding:20px}
.section-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;margin:20px 0 12px}
.section-title:first-child{margin-top:4px}
.row{display:flex;gap:10px}
.row>*{flex:1}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:16px;margin-bottom:12px}
.event-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:18px;margin-bottom:12px;cursor:pointer}
.event-card:active{opacity:.8}
.event-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:3px}
.event-meta{font-size:12px;color:var(--muted)}
.event-sum{font-size:13px;font-weight:600;color:var(--accent);margin-top:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;padding:12px 18px;background:#eee;color:var(--text)}
.btn:active{opacity:.7}
.btn-primary{background:linear-gradient(135deg,#7B3B5E,#C4614A);color:#fff;width:100%;font-size:15px;border-radius:var(--r);padding:14px}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border)}
.btn-danger{background:#FCEBEB;color:#A32D2D;padding:13px}
.btn-copy{background:#EF9F27;color:#fff;width:100%;font-size:15px;font-weight:600;border-radius:var(--r);padding:14px}
.fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;background:linear-gradient(135deg,#7B3B5E,#C4614A);color:#fff;border:none;border-radius:50%;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(123,59,94,0.4);z-index:40;line-height:1}
.fab:active{transform:scale(0.92)}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:62px;z-index:40}
.tab{flex:1;padding:12px 6px 10px;font-size:13px;font-weight:500;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif}
.tab.active{color:var(--text);border-bottom-color:var(--text)}
.tab-content{display:none}
.tab-content.active{display:block}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.form-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:15px;background:#fff;color:var(--text);-webkit-appearance:none;outline:none}
.form-input:focus{border-color:var(--yulia)}
select.form-input{cursor:pointer}
.amt-wrap{position:relative}
.amt-wrap .form-input{padding-right:28px}

.av .av-emoji{display:none}
.av .av-letter{display:none}
.ptog-row{display:flex;gap:8px;margin-bottom:4px}
.ptog{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 4px 8px;border:2px solid var(--border);border-radius:var(--rs);background:#fff;font-family:'DM Sans',sans-serif;cursor:pointer;-webkit-appearance:none;user-select:none}
.ptog span{font-size:11px;font-weight:500;color:var(--muted);pointer-events:none}
.ptog.sel-Л{border-color:var(--lena);background:var(--lena-l)}
.ptog.sel-Л span{color:var(--lena-d)}
.ptog.sel-Ю{border-color:var(--yulia);background:var(--yulia-l)}
.ptog.sel-Ю span{color:var(--yulia-d)}
.ptog.sel-Н{border-color:var(--natali);background:var(--natali-l)}
.ptog.sel-Н span{color:var(--natali-d)}
.exp-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.exp-row:last-child{border-bottom:none}
.exp-info{flex:1;min-width:0}
.exp-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-meta{font-size:11px;color:var(--muted);margin-top:2px}
.exp-amt{font-size:14px;font-weight:600;flex-shrink:0}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.icon-btn.del{background:#FCEBEB;border-color:#FCEBEB}
.icon-btn:active{opacity:.7}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:12px 14px}
.stat-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.stat-val{font-size:18px;font-weight:600}
.cat-row{margin-bottom:10px}
.cat-row:last-child{margin-bottom:0}
.cat-labels{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.cat-track{height:5px;background:#F0EDE8;border-radius:3px;overflow:hidden}
.cat-fill{height:100%;border-radius:3px;background:var(--accent)}
.report-box{background:var(--text);color:#fff;border-radius:var(--r);padding:16px;font-size:12px;line-height:1.9;white-space:pre-wrap;word-break:break-word;margin-bottom:12px;max-height:420px;overflow-y:auto}
.transfer-row{display:flex;align-items:center;gap:10px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:8px}
.transfer-amt{font-size:17px;font-weight:700;color:var(--accent);margin-left:auto}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:flex-end}
.overlay.hidden{display:none}
.sheet{background:var(--bg);border-radius:20px 20px 0 0;padding:22px 20px 36px;width:100%;max-height:92vh;overflow-y:auto}
.sheet-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;margin-bottom:18px}
.modal-btns{display:flex;gap:10px;margin-top:16px}
.modal-btns>.btn{flex:1}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .ico{font-size:44px;margin-bottom:10px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<div id="sEvents" class="screen active">
  <div class="app-header"><h1>Split<span>Girls</span> 💸</h1></div>
  <div class="container">
    <div class="section-title">Мои расчёты</div>
    <div id="eventsList"></div>
  </div>
  <button class="fab" id="fabEvents">+</button>
</div>

<div id="sEvent" class="screen">
  <div class="app-header" id="eventHeader"></div>
  <div class="tab-bar">
    <button class="tab active" id="tabBtnExpenses">Расходы</button>
    <button class="tab" id="tabBtnDashboard">Сводка</button>
    <button class="tab" id="tabBtnReport">Расчёт</button>
  </div>
  <div class="container">
    <div id="tabExpenses" class="tab-content active"></div>
    <div id="tabDashboard" class="tab-content"></div>
    <div id="tabReport" class="tab-content"></div>
  </div>
  <button class="fab" id="fabEvent">+</button>
</div>

<!-- Modal: new event -->
<div class="overlay hidden" id="mNewEvent">
  <div class="sheet">
    <div class="sheet-title">Новый расчёт ✨</div>
    <div class="form-group">
      <label class="form-label">Название</label>
      <input class="form-input" id="inEvName" type="text" placeholder="Концерт, баня, поездка...">
    </div>
    <div class="form-group">
      <label class="form-label">Дата (дд.мм.гггг)</label>
      <input class="form-input" id="inEvDate" type="text" placeholder="24.04.2026" inputmode="numeric" maxlength="10">
    </div>
    <div class="modal-btns">
      <button class="btn btn-ghost" id="btnEvCancel">Отмена</button>
      <button class="btn btn-primary" id="btnEvCreate">Создать</button>
    </div>
  </div>
</div>

<!-- Modal: expense -->
<div class="overlay hidden" id="mExpense">
  <div class="sheet">
    <div class="sheet-title" id="expTitle">Новый расход</div>
    <div class="form-group">
      <label class="form-label">Плательщик</label>
      <div class="ptog-row">
        <button class="ptog" id="payer-Лена"><div class="av av-Л"></div><span>Лена</span></button>
        <button class="ptog" id="payer-Юля"><div class="av av-Ю"></div><span>Юля</span></button>
        <button class="ptog" id="payer-Натали"><div class="av av-Н"></div><span>Натали</span></button>
      </div>
    </div>
    <div class="row">
      <div class="form-group">
        <label class="form-label">Название</label>
        <input class="form-input" id="inExpName" type="text" placeholder="Такси...">
      </div>
      <div class="form-group">
        <label class="form-label">Сумма</label>
        <div class="amt-wrap"><input class="form-input" id="inExpAmt" type="number" placeholder="0" inputmode="decimal"></div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Категория</label>
      <select class="form-input" id="inExpCat">
        <option value="">Выбрать...</option>
        <option>🍕 Еда и напитки</option>
        <option>🚕 Транспорт</option>
        <option>🏠 Жильё</option>
        <option>🎟 Билеты</option>
        <option>🛒 Покупки</option>
        <option>💆 Красота и спа</option>
        <option>🎉 Развлечения</option>
        <option>💊 Аптека</option>
        <option>🌀 Другое</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">На кого делится</label>
      <div class="ptog-row">
        <button class="ptog" id="split-Лена"><div class="av av-Л"></div><span>Лена</span></button>
        <button class="ptog" id="split-Юля"><div class="av av-Ю"></div><span>Юля</span></button>
        <button class="ptog" id="split-Натали"><div class="av av-Н"></div><span>Натали</span></button>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-ghost" id="btnExpCancel">Отмена</button>
      <button class="btn btn-primary" id="btnExpSave">Сохранить</button>
    </div>
  </div>
</div>

<!-- Modal: confirm delete -->
<div class="overlay hidden" id="mDelete">
  <div class="sheet">
    <div class="sheet-title">Удалить расход?</div>
    <p style="color:var(--muted);margin-bottom:16px;font-size:14px">Это действие нельзя отменить.</p>
    <div class="modal-btns">
      <button class="btn btn-ghost" id="btnDelCancel">Отмена</button>
      <button class="btn btn-danger" id="btnDelConfirm">Удалить 🗑</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PEOPLE = ['Лена','Юля','Натали'];
const INI = {Лена:'Л', Юля:'Ю', Натали:'Н'};
const EMOJI = {Лена:'🔥', Юля:'⭐️', Натали:'🌙'};
function avHTML(person, extraClass=''){
  const i=INI[person];
  return `<div class="av av-${i}${extraClass?' '+extraClass:''}"></div>`;
}

let state = {events:[]};
let curEventId = null;
let expEditId = null;
let expDelId  = null;
let payerSel  = null;
let splitSel  = new Set();

// ── Storage ──
function loadState(){
  try{ const r=localStorage.getItem('sg3'); if(r) state=JSON.parse(r); }catch(e){}
}
function saveState(){
  try{ localStorage.setItem('sg3', JSON.stringify(state)); }catch(e){}
}

// ── Utils ──
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function fmt(n){ return Math.round(n).toLocaleString('ru-RU')+' ₽'; }
function fmtDate(d){
  if(!d) return '';
  const M=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  const p=d.split('.');
  if(p.length===3){const day=parseInt(p[0]),mon=parseInt(p[1])-1;if(!isNaN(day)&&mon>=0&&mon<12) return `${day} ${M[mon]} ${p[2]}`;}
  return d;
}
function todayStr(){
  const d=new Date();
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
}
function evEmoji(n){
  const s=n.toLowerCase();
  if(s.includes('баня')||s.includes('спа')) return '🧖';
  if(s.includes('концерт')||s.includes('музык')) return '🎵';
  if(s.includes('поездк')||s.includes('путешеств')) return '✈️';
  if(s.includes('бар')||s.includes('паб')||s.includes('клуб')) return '🍸';
  if(s.includes('день рожден')) return '🎂';
  if(s.includes('ресторан')||s.includes('кафе')) return '🍽';
  return '✨';
}
function catIco(c){ return c?c.split(' ')[0]:'💰'; }
function getEvent(){ return state.events.find(e=>e.id===curEventId); }
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200);
}

// ── Screens ──
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Modals ──
function openModal(id){ document.getElementById(id).classList.remove('hidden'); }
function closeModal(id){ document.getElementById(id).classList.add('hidden'); }

// Tap outside sheet to close
document.querySelectorAll('.overlay').forEach(overlay=>{
  const sheet=overlay.querySelector('.sheet');
  overlay.addEventListener('click', e=>{ if(!sheet.contains(e.target)) closeModal(overlay.id); });
});

// ── Payer/Split toggles — wired ONCE at startup ──
PEOPLE.forEach(p=>{
  // payer: single select
  document.getElementById('payer-'+p).addEventListener('click', ()=>{
    payerSel = p;
    PEOPLE.forEach(x=>{
      const b=document.getElementById('payer-'+x);
      b.className = 'ptog' + (x===p ? ' sel-'+INI[x] : '');
    });
  });
  // split: multi-select toggle
  document.getElementById('split-'+p).addEventListener('click', ()=>{
    if(splitSel.has(p)){
      if(splitSel.size>1) splitSel.delete(p);
    } else {
      splitSel.add(p);
    }
    PEOPLE.forEach(x=>{
      const b=document.getElementById('split-'+x);
      b.className = 'ptog' + (splitSel.has(x) ? ' sel-'+INI[x] : '');
    });
  });
});

function resetPayerUI(){
  PEOPLE.forEach(p=>{ document.getElementById('payer-'+p).className='ptog'; });
}
function resetSplitUI(){
  PEOPLE.forEach(p=>{ document.getElementById('split-'+p).className='ptog'; });
}
function applyPayerUI(){
  PEOPLE.forEach(p=>{
    document.getElementById('payer-'+p).className='ptog'+(p===payerSel?' sel-'+INI[p]:'');
  });
}
function applySplitUI(){
  PEOPLE.forEach(p=>{
    document.getElementById('split-'+p).className='ptog'+(splitSel.has(p)?' sel-'+INI[p]:'');
  });
}

// ── Events list ──
function renderEventsList(){
  const el=document.getElementById('eventsList');
  if(!state.events.length){
    el.innerHTML='<div class="empty"><div class="ico">💸</div><p>Пока нет расчётов.<br>Нажми + чтобы начать!</p></div>';
    return;
  }
  el.innerHTML=state.events.map(ev=>{
    const total=ev.expenses.reduce((s,e)=>s+e.amount,0);
    const cnt=ev.expenses.length;
    const cntLbl=cnt===1?'1 расход':cnt<5?cnt+' расхода':cnt+' расходов';
    return `<div class="event-card" data-id="${ev.id}">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <span style="font-size:26px">${evEmoji(ev.name)}</span>
        <div style="flex:1">
          <div class="event-title">${ev.name}</div>
          <div class="event-meta">${ev.date?fmtDate(ev.date)+' · ':''}${cntLbl}</div>
          ${total>0?`<div class="event-sum">Итого: ${fmt(total)}</div>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
  el.querySelectorAll('.event-card').forEach(c=>{
    c.addEventListener('click',()=>openEvent(c.dataset.id));
  });
}

// New event
document.getElementById('fabEvents').addEventListener('click',()=>{
  document.getElementById('inEvName').value='';
  document.getElementById('inEvDate').value=todayStr();
  openModal('mNewEvent');
  setTimeout(()=>document.getElementById('inEvName').focus(),300);
});
document.getElementById('btnEvCancel').addEventListener('click',()=>closeModal('mNewEvent'));
document.getElementById('btnEvCreate').addEventListener('click',()=>{
  const name=document.getElementById('inEvName').value.trim();
  const date=document.getElementById('inEvDate').value.trim();
  if(!name){ toast('Введи название 👆'); return; }
  const ev={id:uid(),name,date,expenses:[]};
  state.events.unshift(ev);
  saveState();
  closeModal('mNewEvent');
  renderEventsList();
  openEvent(ev.id);
});

// ── Event detail ──
function openEvent(id){
  curEventId=id;
  const ev=getEvent();
  document.getElementById('eventHeader').innerHTML=`
    <button class="back-btn" id="backBtn">← Назад</button>
    <h1 style="font-family:'Playfair Display',serif;font-size:19px;font-weight:900">${evEmoji(ev.name)} ${ev.name}</h1>
    ${ev.date?`<div class="header-sub">${fmtDate(ev.date)}</div>`:''}
  `;
  document.getElementById('backBtn').addEventListener('click',()=>{
    showScreen('sEvents'); renderEventsList();
  });
  switchTab('expenses');
  showScreen('sEvent');
}

document.getElementById('tabBtnExpenses').addEventListener('click',()=>switchTab('expenses'));
document.getElementById('tabBtnDashboard').addEventListener('click',()=>switchTab('dashboard'));
document.getElementById('tabBtnReport').addEventListener('click',()=>switchTab('report'));

function switchTab(tab){
  ['expenses','dashboard','report'].forEach(t=>{
    const cap=t.charAt(0).toUpperCase()+t.slice(1);
    document.getElementById('tabBtn'+cap).classList.toggle('active',t===tab);
    document.getElementById('tab'+cap).classList.toggle('active',t===tab);
  });
  document.getElementById('fabEvent').style.display=tab==='expenses'?'flex':'none';
  if(tab==='expenses')  renderExpenses();
  if(tab==='dashboard') renderDashboard();
  if(tab==='report')    renderReport();
}

// ── Expenses ──
document.getElementById('fabEvent').addEventListener('click',openAddExpenseModal);
document.getElementById('btnExpCancel').addEventListener('click',()=>closeModal('mExpense'));
document.getElementById('btnExpSave').addEventListener('click',doSaveExpense);
document.getElementById('btnDelCancel').addEventListener('click',()=>closeModal('mDelete'));
document.getElementById('btnDelConfirm').addEventListener('click',doDeleteExpense);

function openAddExpenseModal(){
  expEditId=null; payerSel=null; splitSel=new Set();
  document.getElementById('expTitle').textContent='Новый расход';
  document.getElementById('inExpName').value='';
  document.getElementById('inExpAmt').value='';
  document.getElementById('inExpCat').value='';
  resetPayerUI(); resetSplitUI();
  openModal('mExpense');
}
function openEditExpenseModal(id){
  const exp=getEvent().expenses.find(e=>e.id===id);
  if(!exp) return;
  expEditId=id; payerSel=exp.payer; splitSel=new Set(exp.split);
  document.getElementById('expTitle').textContent='Редактировать';
  document.getElementById('inExpName').value=exp.name;
  document.getElementById('inExpAmt').value=exp.amount;
  document.getElementById('inExpCat').value=exp.category||'';
  applyPayerUI(); applySplitUI();
  openModal('mExpense');
}
function doSaveExpense(){
  if(!payerSel){ toast('Выбери плательщика 👆'); return; }
  if(!splitSel.size){ toast('Выбери на кого делить 👆'); return; }
  const name=document.getElementById('inExpName').value.trim();
  const amt=parseFloat(document.getElementById('inExpAmt').value);
  const cat=document.getElementById('inExpCat').value;
  if(!name){ toast('Введи название'); return; }
  if(!amt||amt<=0){ toast('Введи сумму'); return; }
  if(!cat){ toast('Выбери категорию'); return; }
  const ev=getEvent();
  if(expEditId){
    Object.assign(ev.expenses.find(e=>e.id===expEditId),{payer:payerSel,name,amount:amt,category:cat,split:[...splitSel]});
  } else {
    ev.expenses.push({id:uid(),payer:payerSel,name,amount:amt,category:cat,split:[...splitSel]});
  }
  saveState(); closeModal('mExpense'); renderExpenses();
  toast(expEditId?'Обновлено ✓':'Добавлено ✓');
}
function askDelete(id){ expDelId=id; openModal('mDelete'); }
function doDeleteExpense(){
  const ev=getEvent();
  ev.expenses=ev.expenses.filter(e=>e.id!==expDelId);
  saveState(); closeModal('mDelete'); renderExpenses(); toast('Удалено');
}

function renderExpenses(){
  const ev=getEvent();
  const el=document.getElementById('tabExpenses');
  if(!ev.expenses.length){
    el.innerHTML='<div class="empty"><div class="ico">🧾</div><p>Добавь первый расход</p></div>';
    return;
  }
  const groups={};
  ev.expenses.forEach(exp=>{
    const key=exp.payer+'|'+[...exp.split].sort().join(',');
    if(!groups[key]) groups[key]={payer:exp.payer,split:exp.split,items:[]};
    groups[key].items.push(exp);
  });
  let html='';
  Object.values(groups).forEach(g=>{
    const splitLbl=g.split.length===3?'на троих':'на '+g.split.join(' и ');
    html+=`<div class="card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      ${avHTML(g.payer)}
      <div><div style="font-size:13px;font-weight:600">${g.payer}</div><div style="font-size:11px;color:var(--muted)">${splitLbl}</div></div>
    </div>`;
    const catG={};
    g.items.forEach(exp=>{ const c=exp.category||'🌀 Другое'; if(!catG[c]) catG[c]=[]; catG[c].push(exp); });
    Object.entries(catG).forEach(([cat,items])=>{
      if(items.length>1){
        const ct=items.reduce((s,e)=>s+e.amount,0);
        // Category header
        html+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 0 4px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:17px">${catIco(cat)}</span>
          <span style="font-size:12px;font-weight:600;color:var(--muted);flex:1">${cat.replace(/^\S+ /,'')}</span>
          <span style="font-size:13px;font-weight:700">${fmt(ct)}</span>
        </div>`;
        items.forEach(e=>{
          html+=`<div class="exp-row" style="padding-left:24px">
            <div class="exp-info">
              <div class="exp-name">${e.name}</div>
              <div class="exp-meta">${fmt(e.amount)}</div>
            </div>
            <div style="display:flex;gap:5px;flex-shrink:0">
              <button class="icon-btn" data-edit="${e.id}">✏️</button>
              <button class="icon-btn del" data-del="${e.id}">🗑</button>
            </div>
          </div>`;
        });
      } else {
        const e=items[0];
        html+=`<div class="exp-row"><span style="font-size:18px">${catIco(cat)}</span>
          <div class="exp-info"><div class="exp-name">${e.name}</div><div class="exp-meta">${cat.replace(/^\S+ /,'')}</div></div>
          <div class="exp-amt">${fmt(e.amount)}</div>
          <div style="display:flex;gap:5px;flex-shrink:0"><button class="icon-btn" data-edit="${e.id}">✏️</button><button class="icon-btn del" data-del="${e.id}">🗑</button></div>
        </div>`;
      }
    });;
    const gTotal=g.items.reduce((s,e)=>s+e.amount,0);
    html+=`<div style="display:flex;justify-content:flex-end;padding-top:8px;border-top:1px solid var(--border);margin-top:4px"><span style="font-size:12px;font-weight:600;color:var(--muted)">Итого: ${fmt(gTotal)}</span></div></div>`;
  });
  el.innerHTML=html;
  el.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',()=>openEditExpenseModal(b.dataset.edit)));
  el.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>askDelete(b.dataset.del)));
}

// ── Dashboard ──
function renderDashboard(){
  const ev=getEvent(); const el=document.getElementById('tabDashboard');
  if(!ev.expenses.length){ el.innerHTML='<div class="empty"><div class="ico">📊</div><p>Сначала добавь расходы</p></div>'; return; }
  const total=ev.expenses.reduce((s,e)=>s+e.amount,0);
  const paid={}; PEOPLE.forEach(p=>paid[p]=0);
  ev.expenses.forEach(exp=>paid[exp.payer]+=exp.amount);
  const cats={}; ev.expenses.forEach(exp=>cats[exp.category]=(cats[exp.category]||0)+exp.amount);
  const sortedCats=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  let html=`<div class="stat-grid"><div class="stat-card" style="grid-column:1/-1"><div class="stat-label">Всего потрачено</div><div class="stat-val" style="font-size:26px">${fmt(total)}</div></div>`;
  PEOPLE.forEach(p=>{ if(paid[p]>0) html+=`<div class="stat-card"><div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">${avHTML(p)}<div class="stat-label" style="margin:0">${p}</div></div><div class="stat-val" style="font-size:16px">${fmt(paid[p])}</div></div>`; });
  html+='</div><div class="section-title" style="font-size:15px;margin-top:8px">По категориям</div><div class="card">';
  sortedCats.forEach(([cat,amt])=>{ const pct=Math.round(amt/total*100); html+=`<div class="cat-row"><div class="cat-labels"><span>${cat}</span><span style="font-weight:600">${fmt(amt)} <span style="color:var(--muted);font-weight:400">${pct}%</span></span></div><div class="cat-track"><div class="cat-fill" style="width:${pct}%"></div></div></div>`; });
  html+='</div>'; el.innerHTML=html;
}

// ── Calculations ──
function calcBalances(expenses){
  const bal={}; PEOPLE.forEach(p=>bal[p]=0);
  expenses.forEach(exp=>{ const n=exp.split.length,share=exp.amount/n; bal[exp.payer]+=exp.amount; exp.split.forEach(p=>bal[p]-=share); });
  return bal;
}
function calcTransfers(bal){
  const cred=[],debt=[];
  Object.entries(bal).forEach(([p,b])=>{ if(b>0.01) cred.push({name:p,amount:b}); if(b<-0.01) debt.push({name:p,amount:-b}); });
  cred.sort((a,b)=>b.amount-a.amount); debt.sort((a,b)=>b.amount-a.amount);
  const tr=[]; let i=0,j=0;
  while(i<cred.length&&j<debt.length){
    const amt=Math.min(cred[i].amount,debt[j].amount);
    if(amt>0.01) tr.push({from:debt[j].name,to:cred[i].name,amount:amt});
    cred[i].amount-=amt; debt[j].amount-=amt;
    if(cred[i].amount<0.01) i++; if(debt[j].amount<0.01) j++;
  }
  return tr;
}

// ── Report ──
function renderReport(){
  const ev=getEvent(); const el=document.getElementById('tabReport');
  if(!ev.expenses.length){ el.innerHTML='<div class="empty"><div class="ico">🧮</div><p>Сначала добавь расходы</p></div>'; return; }
  const bal=calcBalances(ev.expenses); const tr=calcTransfers(bal);
  let html='<div style="margin-bottom:14px"><div class="section-title" style="font-size:15px;margin-top:0;margin-bottom:10px">💸 Итоговые переводы</div>';
  if(!tr.length){ html+='<div class="card" style="text-align:center;color:var(--muted)">Все в расчёте 🎉</div>'; }
  else tr.forEach(t=>{ html+=`<div class="transfer-row">${avHTML(t.from)}<span style="font-size:13px;font-weight:500">${t.from}</span><span style="color:var(--muted);font-size:16px;padding:0 4px">→</span>${avHTML(t.to)}<span style="font-size:13px;font-weight:500">${t.to}</span><div class="transfer-amt">${fmt(t.amount)}</div></div>`; });
  html+='</div><div class="section-title" style="font-size:15px;margin-bottom:8px">📋 Подробный отчёт</div>';
  html+=`<div class="report-box">${buildReport(ev)}</div>`;
  html+=`<button class="btn btn-copy" id="btnCopy">📋 Скопировать отчёт</button>`;
  el.innerHTML=html;
  document.getElementById('btnCopy').addEventListener('click',()=>{
    const text=buildReport(ev);
    if(navigator.clipboard){ navigator.clipboard.writeText(text).then(()=>toast('Скопировано! ✓')); }
    else{ const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Скопировано! ✓'); }
  });
}

function buildReport(ev){
  const D='—'.repeat(30); const lines=[];
  lines.push(`🧾 РАСЧЁТ: ${ev.name.toUpperCase()}`);
  if(ev.date) lines.push(`📅 ${fmtDate(ev.date)}`);
  lines.push(D);
  const groups={};
  ev.expenses.forEach(exp=>{ const key=exp.payer+'|'+[...exp.split].sort().join(','); if(!groups[key]) groups[key]={payer:exp.payer,split:[...exp.split].sort(),items:[]}; groups[key].items.push(exp); });
  let sec=1;
  Object.values(groups).forEach(g=>{
    const n=g.split.length, lbl=n===3?'делим на троих':'только на '+g.split.join(' и ');
    lines.push(''); lines.push(`${sec}. ${g.payer.toUpperCase()} (${lbl})`); lines.push(D);
    const catG={};
    g.items.forEach(exp=>{ const c=exp.category||'🌀 Другое'; if(!catG[c]) catG[c]=[]; catG[c].push(exp); });
    Object.entries(catG).forEach(([cat,items])=>{
      if(items.length>1){ const ct=items.reduce((s,e)=>s+e.amount,0); lines.push(cat); lines.push('  '+items.map(e=>e.name).join(', ')); lines.push('  '+items.map(e=>Math.round(e.amount)).join(' + ')+' = '+fmt(ct)); }
      else { lines.push(`${cat}: ${items[0].name}  ${fmt(items[0].amount)}`); }
    });
    const gT=g.items.reduce((s,e)=>s+e.amount,0); const share=gT/n;
    lines.push(`ИТОГО ${g.payer.toUpperCase()}: ${fmt(gT)}`);
    lines.push(`Доля каждой: ${fmt(gT)} / ${n} = ${fmt(share)}`);
    sec++;
  });
  lines.push(''); lines.push(D); lines.push(`${sec}. ДОЛГИ ДО ВЗАИМОЗАЧЁТА`); lines.push(D);
  Object.values(groups).forEach(g=>{ const total=g.items.reduce((s,e)=>s+e.amount,0),share=total/g.split.length,lbl=g.split.length===3?'общее':'только '+g.split.join(' и '); g.split.forEach(p=>{ if(p!==g.payer) lines.push(`${p} → ${g.payer}: ${fmt(share)}  [${lbl}]`); }); });
  const bal=calcBalances(ev.expenses); const tr=calcTransfers(bal);
  lines.push(''); lines.push(D); lines.push(`${sec+1}. ИТОГОВЫЕ ПЕРЕВОДЫ`); lines.push(D);
  if(!tr.length){ lines.push('Все в расчёте! 🎉'); }
  else {
    tr.forEach(t=>lines.push(`${t.from} → ${t.to}: ${fmt(t.amount)}`));
    lines.push(''); lines.push('ПРОВЕРКА:');
    const chk={}; tr.forEach(t=>chk[t.from]=(chk[t.from]||0)+t.amount);
    Object.entries(chk).forEach(([p,total])=>{ const should=-bal[p]; lines.push(`${p}: ${fmt(total)} (должна: ${fmt(should)}) ${Math.abs(total-should)<1?'✅':'⚠️'}`); });
    const noTr=PEOPLE.filter(p=>!tr.some(t=>t.from===p||t.to===p));
    if(noTr.length) lines.push('\n'+noTr.join(' и ')+' — ничего не переводят.');
  }
  return lines.join('\n');
}

renderEventsList();
